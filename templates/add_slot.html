{% load static %}
<!DOCTYPE html>
<html>

<head>
    <title>Add Slot</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>

<body>
    <div class="navbar">
        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'available' %}">Available Slots</a>
        <a href="{% url 'bookings' %}">Booked Slots</a>
        <a href="{% url 'add_slot' %}">Add Slot</a>
    </div>
    <div class="container">
        <h1>Add New Slot</h1>
        <form method="post" onsubmit="return validateSlot()">
            {% csrf_token %}
            <div class="form-group">
                <label>Date</label>
                <input type="date" name="slot_date" id="slot_date" required>
            </div>
            <div class="form-group">
                <label>Time</label>
                <input type="text" name="slot_time" id="slot_time" placeholder="e.g. 09:00 AM - 10:00 AM" required>
            </div>
            <button type="submit" class="btn">Add Slot</button>
        </form>
        <script>
            function validateSlot() {
                var date = document.getElementById("slot_date").value;
                var time = document.getElementById("slot_time").value;
                if (date == "") {
                    alert("Please select a date");
                    return false;
                }
                if (time == "") {
                    alert("Please enter a time");
                    return false;
                }
                return true;
            }
        </script>
    </div>
</body>

</html>
