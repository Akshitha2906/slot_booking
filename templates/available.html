{% load static %}
<!DOCTYPE html>
<html>

<head>
    <title>Available Slots</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>

<body>
    <div class="navbar">
        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'available' %}">Available Slots</a>
        <a href="{% url 'bookings' %}">Booked Slots</a>
    </div>
    <div class="container">
        <h1>Available Slots</h1>
        {% if slots %}
        <table>
            <tr>
                <th>Date</th>
                <th>Time</th>
                <th>Action</th>
            </tr>
            {% for slot in slots %}
            <tr>
                <td>{{ slot.slot_date }}</td>
                <td>{{ slot.slot_time }}</td>
                <td><a href="{% url 'book' slot.id %}" class="btn">Book Now</a></td>
            </tr>
            {% endfor %}
        </table>
        {% else %}
        <p class="no-data">No available slots right now.</p>
        {% endif %}
    </div>
</body>

</html>
